[Definition]
# Match Jellyfin login attempts proxied through nginx (SWAG)
# Typical nginx access log (combined):
# 1.2.3.4 - - [date] "POST /Users/AuthenticateByName HTTP/1.1" 401 ...
# We ban repeated 401 responses on the auth endpoints.

failregex = ^<HOST>\s+-\s+\S+\s+\[[^\]]+\]\s+"\S+\s+/Users/(AuthenticateByName|AuthenticateByName\?[^\s"]*|AuthenticateByName/[^\s"]*|authenticatebyname|authenticatebyname\?[^\s"]*)[^\s"]*\s+HTTP/[^\"]+"\s+401\s+
            ^<HOST>\s+-\s+\S+\s+\[[^\]]+\]\s+"\S+\s+/Users/(AuthenticateByName|authenticatebyname)[^\s"]*\s+HTTP/[^\"]+"\s+403\s+

ignoreregex =
